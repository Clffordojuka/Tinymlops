name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Ninja
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install ninja

      - name: Show tool versions
        shell: pwsh
        run: |
          cmake --version
          ctest --version
          python --version
          ninja --version
          gcc --version

      - name: Configure project
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_C_COMPILER=gcc

      - name: Build project
        shell: pwsh
        run: |
          cmake --build build

      - name: Run tests
        shell: pwsh
        run: |
          ctest --test-dir build --output-on-failure